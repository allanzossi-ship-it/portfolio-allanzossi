<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail – Le Chocolat des Français — Allan Zossi</title>

  <style>
    :root{
      --bg:#111111;
      --panel:#181818;
      --text:#f4efe8;
      --muted:rgba(244,239,232,.72);
      --line:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    a{text-decoration:none;color:inherit}
    img{width:100%;display:block}

    .container{
      width:min(1180px,calc(100% - 40px));
      margin:auto;
    }

    /* NAV */
    .nav{
      position:sticky;
      top:0;
      background:rgba(17,17,17,.9);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      display:flex;
      justify-content:space-between;
      padding:18px 0;
    }

    /* HERO SECTION */
    .project{
      padding:70px 0;
    }

    .back{
      display:inline-block;
      margin-bottom:30px;
      color:var(--muted);
    }

    .project-head{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
      margin-bottom:40px;
    }

    h1{
      margin:0;
      font-size:clamp(42px,8vw,80px);
    }

    .project-copy{
      color:var(--muted);
    }

    /* HERO IMAGE */
    .hero-img{
      margin-bottom:20px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid var(--line);
    }

    .hero-img img{
      height:520px;
      object-fit:contain;
      background:#222;
    }

    /* GRID */
    .gallery{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:10px;
    }

    .card img{
      height:420px;
      object-fit:contain;
      background:#222;
      border-radius:16px;
    }

    footer{
      padding:40px;
      text-align:center;
      color:rgba(255,255,255,.5);
    }

    @media(max-width:900px){
      .project-head,
      .gallery{
        grid-template-columns:1fr;
      }

      .hero-img img{
        height:350px;
      }

      .card img{
        height:280px;
      }
    }
  </style>
</head>

<body>

<header class="nav">
  <div class="container nav-inner">
    <div>ALLAN ZOSSI</div>
    <div>Portfolio</div>
  </div>
</header>

<section class="project">
  <div class="container">

    <a href="index.html" class="back">← Retour</a>

    <div class="project-head">
      <h1>Retail</h1>

      <div class="project-copy">
        <p>
          Le projet propose un espace de vente immersif pour Le Chocolat des Français,
          mettant en scène la transparence du produit et l’univers graphique de la marque.
        </p>
      </div>
    </div>

    <!-- HERO IMAGE -->
    <div class="hero-img">
      <img src="images/retail-1.png" alt="Image principale Retail">
    </div>

    <!-- GRID -->
    <div class="gallery">
      <div class="card"><img src="images/retail-2.png"></div>
      <div class="card"><img src="images/retail-3.png"></div>
      <div class="card"><img src="images/retail-4.png"></div>
      <div class="card"><img src="images/retail-5.png"></div>
      <div class="card"><img src="images/retail-6.png"></div>
      <div class="card"><img src="images/retail-7.png"></div>
      <div class="card"><img src="images/retail-8.png"></div>
    </div>

  </div>
</section>

<footer>
  Portfolio d’Allan Zossi
</footer>

</body>
</html>
