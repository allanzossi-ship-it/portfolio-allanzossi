<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabane de surveillance en mer — Allan Zossi</title>

  <style>
    :root{
      --bg:#111111;
      --panel:#181818;
      --text:#f4efe8;
      --muted:rgba(244,239,232,.72);
      --line:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    .container{
      width:min(1180px,calc(100% - 40px));
      margin:0 auto;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(10px);
      background:rgba(17,17,17,.86);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .brand small{
      display:block;
      text-transform:uppercase;
      letter-spacing:.3em;
      color:var(--muted);
      font-size:11px;
    }

    .brand strong{
      letter-spacing:.16em;
      font-size:18px;
    }

    .menu{
      display:flex;
      gap:22px;
      color:var(--muted);
      font-size:14px;
    }

    footer{
      padding:28px 0 50px;
      color:rgba(255,255,255,.48);
      font-size:14px;
    }
