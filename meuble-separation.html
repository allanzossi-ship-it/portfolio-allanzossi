<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meuble de séparation — Allan Zossi</title>

<style>
:root{
  --bg:#111111;
  --panel:#181818;
  --text:#f4efe8;
  --muted:rgba(244,239,232,.72);
  --line:rgba(255,255,255,.09);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}

a{text-decoration:none;color:inherit}

img{
  max-width:100%;
  display:block;
}

.container{
  width:min(1180px,calc(100% - 40px));
  margin:auto;
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:rgba(17,17,17,.9);
  border-bottom:1px solid var(--line);
}

.nav-inner{
  display:flex;
  justify-content:space-between;
  padding:18px 0;
}

.brand small{
  display:block;
  letter-spacing:.3em;
  font-size:11px;
  color:var(--muted);
}

.brand strong{
  font-size:18px;
}

/* PAGE */
.project-hero{
  padding:70px 0;
}

.back{
  display:inline-block;
  margin-bottom:30px;
  color:var(--muted);
}

.project-head{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  margin-bottom:40px;
}

h1{
  margin:0;
  font-size:clamp(42px,8vw,80px);
}

.project-copy{
  color:var(--muted);
}

/* HERO */
.hero-img{
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0c0c0c;
  border-radius:24px;
  border:1px solid var(--line);
  padding:40px;
  margin-bottom:20px;
}

.hero-img img{
  max-height:600px;
  width:auto;
  object-fit:contain;
  border-radius:16px;
}

/* GRID */
.project-gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0c0c0c;
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
}

.card img{
  max-height:420px;
  width:auto;
  object-fit:contain;
  border-radius:12px;
}

footer{
  padding:40px;
  text-align:center;
  color:rgba(255,255,255,.5);
}

@media(max-width:900px){
  .project-head,
  .project-gallery{
    grid-template-columns:1fr;
  }

  .hero-img img{
    max-height:400px;
  }

  .card img{
    max-height:300px;
  }
}
</style>
</head>

<body>

<header class="nav">
  <div class="container nav-inner">
    <div class="brand">
      <small>Portfolio</small>
      <strong>ALLAN ZOSSI</strong>
    </div>
  </div>
</header>

<section class="project-hero">
<div class="container">

<a href="index.html" class="back">← Retour</a>

<div class="project-head">
  <h1>Meuble de séparation</h1>

  <div class="project-copy">
    <p>
      Ce meuble multifonction organise l’espace en réunissant plusieurs usages du quotidien :
      repas, travail, rangement, assise et coin multimédia. Il structure le volume tout en
      optimisant les circulations et les ambiances.
    </p>
  </div>
</div>

<!-- HERO -->
<div class="hero-img">
  <img src="images/meuble-1.png" alt="Vue principale du meuble">
</div>

<!-- GRID -->
<div class="project-gallery">

  <div class="card">
    <img src="images/meuble-2.png" alt="">
  </div>

  <div class="card">
    <img src="images/meuble-3.png" alt="">
  </div>

  <div class="card">
    <img src="images/meuble-4.png" alt="">
  </div>

  <div class="card">
    <img src="images/meuble-5.png" alt="">
  </div>

</div>

</div>
</section>

<footer>
  Portfolio d’Allan Zossi
</footer>

</body>
</html>
