<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Guinguette</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin: 40px 0;
        }

        /* IMAGE PRINCIPALE */
        .hero img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        /* GRID 4 IMAGES */
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .grid-4 img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        /* RECTANGLES */
        .rectangles {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .rectangles img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Guinguette</h1>

    <!-- IMAGE PRINCIPALE -->
    <div class="hero">
        <img src="images/guinguette-1.png">
    </div>

    <!-- 4 IMAGES -->
    <div class="grid-4">
        <img src="images/guinguette-2.png">
        <img src="images/guinguette-3.png">
        <img src="images/guinguette-4.png">
        <img src="images/guinguette-5.png">
    </div>

    <!-- RECTANGLES -->
    <div class="rectangles">
        <img src="images/guinguette-6.png">
        <img src="images/guinguette-7.png">
    </div>

</div>

</body>
</html>
